<script src="/assets/frappe/js/lib/socket.io.min.js"></script>
<script>
  frappe.ready(function () {
    // 1. Initialize Socket.IO
    if (!frappe.realtime.socket) {
      frappe.realtime.init();
    }

    // 2. Load previous messages
    frappe.call({
      method: "frappe.client.get_list",
      args: {
        doctype: "Message",
        fields: ["message_content", "owner"],
        order_by: "creation asc",
        limit_page_length: 50
      },
      callback: function(r) {
        if (r.message) {
          r.message.forEach(function(msg) {
            appendMessage(msg.owner, msg.message_content);
          });
        }
      }
    });

    // 3. Listen to new real-time messages
    frappe.realtime.on("new_message", function(data) {
      appendMessage(data.sender, data.message);
    });

    function appendMessage(sender, message) {
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.textContent = `${sender}: ${message}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  });
</script>
