{% extends "templates/web.html" %}

{% block page_content %}
<h2>Live Chat</h2>
<div id="messages" style="height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;"></div>
<br>
<input type="text" id="message_input" placeholder="Type your message..." style="width: 70%;" />
<button onclick="sendMessage()">Send</button>

<!-- Include Frappe frontend (for frappe.call etc.) -->
<!-- <script src="/assets/frappe/js/frappe-web.min.js"></script> -->
{% include "public/js/frappe-web.min.js" %}
<!-- Include socket.io client -->
<!-- <script src="/assets/frappe/js/lib/socket.io.min.js"></script> -->
{% include "public/js/lib/socket.io.min.js" %}

<script>
  // Wait until frappe is ready
  window.frappe = window.frappe || {};
  frappe.ready = function (fn) {
    if (document.readyState !== "loading") fn();
    else document.addEventListener("DOMContentLoaded", fn);
  };

  frappe.realtime = {
    handlers: {},
    on(event, fn) {
      this.handlers[event] = fn;
    },
    init() {
      this.socket = io();
      this.socket.on('message', function (msg) {
        // debug fallback
        console.log("Socket message:", msg);
      });
      for (let key in this.handlers) {
        this.socket.on(key, this.handlers[key]);
      }
    }
  };

  frappe.ready(function () {
    // Initialize realtime
    frappe.realtime.init();

    // Load previous messages
    // frappe.call({
    //   method: "frappe.client.get_list",
    //   args: {
    //     doctype: "Message",
    //     fields: ["message_content", "owner"],
    //     order_by: "creation asc",
    //     limit_page_length: 50
    //   },
    //   callback: function (r) {
    //     if (r.message) {
    //       r.message.forEach(function (msg) {
    //         appendMessage(msg.owner, msg.message_content);
    //       });
    //     }
    //   }
    // });

    // Listen to new real-time messages
    frappe.realtime.on("new_message", function (data) {
      appendMessage(data.sender, data.message);
    });

    // window.sendMessage = function () {
    //   const input = document.getElementById("message_input");
    //   const message = input.value.trim();
    //   if (!message) return;

    //   frappe.call({
    //     method: "pcms.api.messaging.send_message",  // adjust to your actual method
    //     args: {
    //       message_text: message
    //     },
    //     callback: function () {
    //       input.value = "";
    //     }
    //   });
    // };

    function appendMessage(sender, message) {
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.textContent = `${sender}: ${message}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  });
</script>
{% endblock %}
