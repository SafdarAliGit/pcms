{% extends "templates/web.html" %}

{% block page_content %}
<link rel="stylesheet" href="/assets/pcms/css/ns.css">
<h3 class="chat-title">💬 Patient's Messages ({{ station}})</h2>

<div id="messages" class="chat-box"></div>
<script>
  window.nursing_station = {{ station | tojson | safe }};
</script>
<script src="/assets/pcms/js/ns.js"></script>

<!-- Modal HTML -->
<!-- Include this where you want the modal -->
<dialog id="relogin-modal" class="relogin-modal">
  <form method="dialog" class="relogin-modal__content">
    <h3>Re-login Required</h3>
    <label>
      Username:<br>
      <input type="text" id="relogin-username" required>
    </label>
    <label>
      Password:<br>
      <input type="password" id="relogin-password" required>
    </label>
    <menu class="relogin-modal__buttons">
      <button value="cancel">Cancel</button>
      <button id="relogin-submit" value="login">Login</button>
    </menu>
  </form>
</dialog>

{% endblock %}
